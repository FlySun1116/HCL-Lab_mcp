schema_version: 1
entries:
  - id: hcl-5103-s6850-project-parsing
    hcl_version: "5.10.3"
    device_family: "H3C S-series project metadata"
    models:
      - S6850
    capability: project-topology-parsing
    transport: filesystem
    status: real-pass
    evidence:
      repository_paths:
        - docs/TEST_REPORT_v0.1.md
        - docs/HANDOVER.md
      external: >-
        A local, redacted HCL 5.10.3 user project was discovered through the
        official MCP ClientSession path; projectInfo/deviceInfoList, six devices,
        five links, and two S6850 H3C candidates were observed.
    limitations:
      - This proves read-only project metadata parsing, not a live console command path.
      - The real project name, local path, configuration, and raw logs are intentionally not recorded.

  - id: hcl-5103-s6850-runtime-not-running
    hcl_version: "5.10.3"
    device_family: "H3C S-series"
    models:
      - S6850
    capability: runtime-discovery-and-command-precondition
    transport: console_telnet
    status: real-negative
    evidence:
      repository_paths:
        - docs/TEST_REPORT_v0.1.md
        - docs/HANDOVER.md
      external: >-
        In the local HCL 5.10.3 observation the project contained no running
        device or verified endpoint; display version and display ip interface
        brief both returned DEVICE_NOT_RUNNING through ClientSession.
    limitations:
      - No real S6850 prompt, command output, pagination, or successful command execution was observed.
      - This negative result must not be promoted to real-pass when computing release readiness.

