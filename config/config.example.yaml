# HCL-Lab MCP Server Example Configuration (v0.1 beta)
# Windows default location: %LOCALAPPDATA%\h3c-hcl-mcp\config.yaml
# A config file is optional; copy this file only when you need explicit overrides.

server:
  name: h3c-hcl-mcp
  transport: stdio              # v0.1 accepts stdio only
  log_level: INFO
  max_tool_seconds: 60
  max_output_chars: 32768       # Device console capture limit (characters)
  max_tool_result_bytes: 262144 # Final MCP CallToolResult limit (UTF-8 bytes)

# HCL discovery settings
hcl:
  # install_dir: "F:\\HCL"       # Auto-discovered if omitted
  projects_dirs:
    - "${USERPROFILE}\\HCL\\Projects"
  supported_versions: ["5.10.*"]
  runtime_discovery:
    process_inspection: true
    log_observation: true
    loopback_probe: true
    console_host: 127.0.0.1
    max_probe_ports: 32
  private_control_api:
    enabled: false               # NEVER enable — requires H3C authorization

# Device transport settings
devices:
  preferred_transports: [console_telnet] # SSH is reserved for v0.2
  connect_timeout_seconds: 5
  command_timeout_seconds: 20
  per_device_concurrency: 1
  ssh:
    username_env: H3C_HCL_MCP_SSH_USERNAME
    password_env: H3C_HCL_MCP_SSH_PASSWORD
    known_hosts: "${USERPROFILE}\\.ssh\\known_hosts"

# Security policy
policy:
  mode: read_only               # v0.1 has no configuration-write tools
  # Empty means the built-in display allowlist. A non-empty list may only
  # narrow that allowlist; it can never enable a command denied by the server.
  allow_display_prefixes: []
  # Additional case-insensitive literal substrings to deny. Built-in dangerous
  # command and injection checks always run first and cannot be disabled.
  deny_patterns: []
  require_approval_for_writes: true
  plan_ttl_seconds: 300

# Audit trail
audit:
  enabled: true
  database: "${LOCALAPPDATA}\\h3c-hcl-mcp\\audit.db"
  retention_days: 90
  store_raw_device_output: false
