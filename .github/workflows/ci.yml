name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, format, types, and whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --extra dev
      - name: Ruff lint
        run: uv run --locked ruff check .
      - name: Ruff format
        run: uv run --locked ruff format --check .
      - name: Mypy
        run: uv run --locked mypy src
      - name: Reject whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git diff-tree --check --root "$HEAD_SHA"
          fi

  contract-tests:
    name: MCP and port contracts (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --extra dev
      - name: Run contract tests
        run: uv run --locked pytest tests/contract -v

  integration-tests:
    name: Full suite and core coverage (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --extra dev
      - name: Run full suite with core coverage
        run: >-
          uv run --locked pytest -v
          --cov=h3c_hcl_mcp --cov-report=term-missing
          --cov-report=xml --cov-fail-under=85
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  windows-tests:
    name: Full test suite and stdio lifecycle (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --extra dev
      - name: Run all tests
        run: uv run --locked pytest -v

  package:
    name: Build and clean-artifact stdio smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --extra dev
      - name: Build wheel and source distribution
        run: uv build --clear
      - name: Install wheel in an independent environment and test stdio
        shell: pwsh
        run: |
          $wheels = @(Get-ChildItem -LiteralPath "dist" -Filter "h3c_hcl_mcp-*.whl" -File)
          if ($wheels.Count -ne 1) {
            throw "Expected exactly one h3c-hcl-mcp wheel, found $($wheels.Count)."
          }

          $smokeVenv = Join-Path $env:RUNNER_TEMP "h3c-hcl-mcp-wheel-smoke"
          uv venv --python 3.12 $smokeVenv

          $env:UV_PROJECT_ENVIRONMENT = $smokeVenv
          uv sync --locked --no-dev --no-install-project

          $smokePython = Join-Path $smokeVenv "Scripts\python.exe"
          $smokeExecutable = Join-Path $smokeVenv "Scripts\h3c-hcl-mcp.exe"
          uv pip install --python $smokePython --no-deps $wheels[0].FullName
          & $smokePython -c "from importlib.metadata import version; from h3c_hcl_mcp.version import VERSION; assert version('h3c-hcl-mcp') == '0.1.0b2'; assert VERSION == '0.1.0-beta.2'"
          $versionOutput = & $smokeExecutable --version
          if ($LASTEXITCODE -ne 0 -or $versionOutput -ne "h3c-hcl-mcp v0.1.0-beta.2") {
            throw "Unexpected wheel entry-point version: $versionOutput"
          }

          Remove-Item Env:UV_PROJECT_ENVIRONMENT
          $env:H3C_HCL_MCP_TEST_EXECUTABLE = $smokeExecutable
          uv run --locked pytest tests/integration/test_stdio_client.py -v

      - name: Install source distribution in an independent environment and test stdio
        shell: pwsh
        run: |
          $sdists = @(Get-ChildItem -LiteralPath "dist" -Filter "h3c_hcl_mcp-*.tar.gz" -File)
          if ($sdists.Count -ne 1) {
            throw "Expected exactly one h3c-hcl-mcp sdist, found $($sdists.Count)."
          }

          $smokeVenv = Join-Path $env:RUNNER_TEMP "h3c-hcl-mcp-sdist-smoke"
          uv venv --python 3.12 $smokeVenv

          $env:UV_PROJECT_ENVIRONMENT = $smokeVenv
          uv sync --locked --no-dev --no-install-project

          $smokePython = Join-Path $smokeVenv "Scripts\python.exe"
          $smokeExecutable = Join-Path $smokeVenv "Scripts\h3c-hcl-mcp.exe"
          uv pip install --python $smokePython --no-deps $sdists[0].FullName
          & $smokePython -c "from importlib.metadata import version; from h3c_hcl_mcp.version import VERSION; assert version('h3c-hcl-mcp') == '0.1.0b2'; assert VERSION == '0.1.0-beta.2'"
          $versionOutput = & $smokeExecutable --version
          if ($LASTEXITCODE -ne 0 -or $versionOutput -ne "h3c-hcl-mcp v0.1.0-beta.2") {
            throw "Unexpected sdist entry-point version: $versionOutput"
          }

          Remove-Item Env:UV_PROJECT_ENVIRONMENT
          $env:H3C_HCL_MCP_TEST_EXECUTABLE = $smokeExecutable
          uv run --locked pytest tests/integration/test_stdio_client.py -v

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
