name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build, SBOM, checksums, and provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Require a signed tag on main
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME" --jq '.object.sha')"
          test "$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.verified')" = "true"
      - name: Install locked release toolchain
        run: uv sync --locked --extra dev
      - name: Require tag and package versions to match
        shell: bash
        run: |
          package_version="$(uv run --locked python -c 'from h3c_hcl_mcp.version import VERSION; print(VERSION)')"
          test "$GITHUB_REF_NAME" = "v${package_version}"
      - name: Run release quality gates
        run: |
          uv run --locked ruff check .
          uv run --locked ruff format --check .
          uv run --locked mypy src
          uv run --locked pytest -W error::ResourceWarning -W error::pytest.PytestUnraisableExceptionWarning --cov=h3c_hcl_mcp --cov-report=term-missing --cov-fail-under=85
          uv run --locked python scripts/check_docs.py .
          uv run --locked python scripts/check_repository.py .
      - name: Build and validate distributions
        run: |
          uv build --clear
          uv run --locked python scripts/check_distribution.py dist
      - name: Smoke-test wheel and sdist in independent environments
        shell: bash
        run: |
          artifacts=(dist/*.whl dist/*.tar.gz)
          test "${#artifacts[@]}" -eq 2
          for index in 0 1; do
            smoke_venv="$RUNNER_TEMP/release-smoke-$index"
            uv venv --python 3.12 "$smoke_venv"
            uv pip install --python "$smoke_venv/bin/python" "${artifacts[$index]}"
            H3C_HCL_MCP_TEST_PYTHON="$smoke_venv/bin/python" uv run --locked pytest tests/integration/test_stdio_client.py -q -W error::ResourceWarning -W error::pytest.PytestUnraisableExceptionWarning
          done
      - name: Generate runtime SBOM and release checksums
        shell: bash
        run: |
          mkdir release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/
          uv export --quiet --locked --no-dev --no-emit-project --format requirements-txt --output-file "$RUNNER_TEMP/runtime-requirements.txt"
          uv run --locked pip-audit --requirement "$RUNNER_TEMP/runtime-requirements.txt" --require-hashes --strict --progress-spinner off --format cyclonedx-json --output "release-assets/h3c-hcl-mcp-${GITHUB_REF_NAME}-sbom.cdx.json"
          (cd release-assets && sha256sum ./* > SHA256SUMS)
      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: release-assets/SHA256SUMS
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30
      - name: Upload complete release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 90

  publish-pypi:
    name: Publish to PyPI with Trusted Publishing
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/h3c-hcl-mcp
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Require the explicit environment release gate
        env:
          PYPI_RELEASE_ENABLED: ${{ vars.PYPI_RELEASE_ENABLED }}
        run: test "$PYPI_RELEASE_ENABLED" = "true"
      - name: Download immutable Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true

  github-release:
    name: Publish GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --repo "$GITHUB_REPOSITORY" --verify-tag
          --title "$GITHUB_REF_NAME" --generate-notes
